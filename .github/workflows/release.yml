name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            croc_url: "https://github.com/schollz/croc/releases/latest/download/croc_v10.0.13_macOS-ARM64.tar.gz"
            croc_binary: "croc"
            croc_dest: "croc-aarch64-apple-darwin"
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            croc_url: "https://github.com/schollz/croc/releases/latest/download/croc_v10.0.13_macOS-64bit.tar.gz"
            croc_binary: "croc"
            croc_dest: "croc-x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            croc_url: "https://github.com/schollz/croc/releases/latest/download/croc_v10.0.13_Windows-64bit.zip"
            croc_binary: "croc.exe"
            croc_dest: "croc-x86_64-pc-windows-msvc.exe"
          - platform: ubuntu-22.04
            args: ""
            croc_url: "https://github.com/schollz/croc/releases/latest/download/croc_v10.0.13_Linux-64bit.tar.gz"
            croc_binary: "croc"
            croc_dest: "croc-x86_64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Download croc binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -L "${{ matrix.croc_url }}" -o croc_archive
          if [[ "${{ matrix.croc_url }}" == *.zip ]]; then
            unzip -j croc_archive "${{ matrix.croc_binary }}" -d src-tauri/binaries/
          else
            tar -xzf croc_archive -C src-tauri/binaries/ "${{ matrix.croc_binary }}"
          fi
          mv "src-tauri/binaries/${{ matrix.croc_binary }}" "src-tauri/binaries/${{ matrix.croc_dest }}"
          chmod +x "src-tauri/binaries/${{ matrix.croc_dest }}" || true
          rm croc_archive

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VoiceSync ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
